<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Exemplo de Site</title>
  <style>
    body {
      background-color: #f0f8ff;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    h1 {
      color: teal;
    }
    p {
      font-size: 18px;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
    .highlight {
      background-color: yellow;
      padding: 4px;
    }
    #meu-titulo {
      color: darkblue;
      font-size: 28px;
    }
    a:hover {
      color: red;
    }
  </style>
</head>
<body>

  <h1 id="meu-titulo">O meu site de exemplo</h1>

  <p>Este é um parágrafo com <span class="highlight">destaque</span> especial!</p>

  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Lisbon_Montage_2016.png/640px-Lisbon_Montage_2016.png" alt="Lisboa">

  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>

  <a href="https://www.ulisboa.pt" target="_blank">Visita a ULisboa</a>

</body>
</html>
